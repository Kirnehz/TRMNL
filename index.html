<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1872, height=1404">
    <title>Dato og Klokke</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 1872px;
            height: 1404px;
            overflow: hidden;
            background: white;
            color: black;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #clock {
            text-align: center;
        }

        #date {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        #time {
            font-size: 180px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="clock">
    <div id="date"></div>
    <div id="time"></div>
</div>

<script>
    function updateClock() {
        const now = new Date();

        const dateOptions = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        };

    document.getElementById('date').textContent =
        now.toLocaleDateString('da-DK', dateOptions);

    document.getElementById('time').textContent =
        now.toLocaleTimeString('da-DK', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
</script>

</body>
</html>
